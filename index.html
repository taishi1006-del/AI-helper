<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>レポートAIサポーター</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="学生レポート向けAI質問作成ツール">
        <aside class="sidebar">
          <div class="brand">
            <img src="./assets/mark.svg" alt="" class="brand-mark" />
            <div>
              <p class="eyebrow">学生レポート支援</p>
              <h1>レポートAIサポーター</h1>
            </div>
          </div>

          <div class="policy-card">
            <p class="eyebrow">方針</p>
            <p>AIは代筆ではなく、テーマ整理、構成、根拠確認、添削の相談相手として使います。</p>
          </div>

          <div class="panel">
            <label class="field-label" for="templateSearch">テンプレート検索</label>
            <input id="templateSearch" class="search-input" type="search" placeholder="例: テーマ、構成、引用、添削" />
          </div>

          <nav class="category-list" aria-label="カテゴリ">
            <button class="category-button is-active" type="button" data-category="all">すべて</button>
            <button class="category-button" type="button" data-category="topic">テーマ</button>
            <button class="category-button" type="button" data-category="outline">構成</button>
            <button class="category-button" type="button" data-category="research">調査</button>
            <button class="category-button" type="button" data-category="draft">下書き</button>
            <button class="category-button" type="button" data-category="revision">添削</button>
            <button class="category-button" type="button" data-category="citation">引用</button>
            <button class="category-button" type="button" data-category="custom">自作</button>
          </nav>

          <form id="customTemplateForm" class="custom-template-form">
            <div>
              <p class="eyebrow">My Template</p>
              <h2>自作テンプレート</h2>
            </div>

            <label class="field-block">
              <span class="field-label">テンプレート名</span>
              <input id="customTitle" class="text-field" type="text" placeholder="例: 資料比較メモ" />
            </label>

            <label class="field-block">
              <span class="field-label">説明</span>
              <input id="customDescription" class="text-field" type="text" placeholder="例: 複数資料の違いを整理する" />
            </label>

            <label class="field-block">
              <span class="field-label">入力欄名</span>
              <textarea id="customFields" class="text-field compact-textarea" placeholder="例: レポートテーマ&#10;資料Aの要点&#10;資料Bの要点"></textarea>
            </label>

            <label class="field-block">
              <span class="field-label">AIへの指示文</span>
              <textarea id="customInstruction" class="text-field compact-textarea" placeholder="例: 次の資料メモを比較し、レポートに使える論点を整理してください。"></textarea>
            </label>

            <button class="primary-button" type="submit">保存</button>
            <p id="customStatus" class="custom-status" role="status" aria-live="polite"></p>
          </form>
        </aside>

        <section class="template-column" aria-label="テンプレート一覧">
          <div class="section-heading">
            <p class="eyebrow">Step 1</p>
            <h2>レポート作業を選ぶ</h2>
          </div>
          <div id="templateList" class="template-list"></div>
        </section>

        <section class="builder-column" aria-label="文章作成フォーム">
          <div class="section-heading">
            <p class="eyebrow">Step 2</p>
            <h2 id="selectedTitle">条件を入れる</h2>
          </div>

          <form id="promptForm" class="builder-form">
            <div class="control-grid">
              <label class="select-wrap">
                <span class="field-label">サポート方針</span>
                <select id="toneSelect">
                  <option value="学生の考えを引き出す形で">考えを引き出す</option>
                  <option value="大学レポートらしい落ち着いた表現で">レポート向け</option>
                  <option value="初心者にもわかるように段階的に">段階的</option>
                  <option value="厳しめに論理の弱点も指摘して">厳しめ</option>
                </select>
              </label>

              <label class="select-wrap">
                <span class="field-label">回答の詳しさ</span>
                <select id="lengthSelect">
                  <option value="必要な情報を過不足なく入れてください">標準</option>
                  <option value="まず確認すべき要点だけを簡潔にまとめてください">要点だけ</option>
                  <option value="背景、理由、具体例、注意点まで詳しく書いてください">詳しく</option>
                </select>
              </label>
            </div>

            <div id="dynamicFields" class="dynamic-fields"></div>
          </form>

          <div class="output-panel">
            <div class="output-header">
              <div>
                <p class="eyebrow">Step 3</p>
                <h2>AIに質問する文章</h2>
              </div>
              <div class="actions">
                <button id="copyButton" class="icon-button" type="button" title="コピー" aria-label="コピー">
                  <span aria-hidden="true">⧉</span>
                </button>
                <button id="clearButton" class="icon-button" type="button" title="入力を消す" aria-label="入力を消す">
                  <span aria-hidden="true">×</span>
                </button>
              </div>
            </div>
            <textarea id="promptOutput" class="prompt-output" readonly></textarea>
            <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
